name: Web — Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Required for deploy-pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; don't cancel in-flight so a partial deploy
# doesn't leave Pages empty.
concurrency:
  group: pages
  cancel-in-progress: false

env:
  GODOT_VERSION: "4.3"

jobs:
  build:
    name: Export to HTML5
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Godot ────────────────────────────────────────────────────────────────
      - name: Cache Godot binaries
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/godot
            ~/godot
          key: godot-${{ env.GODOT_VERSION }}

      - name: Download Godot (headless)
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          wget -q \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip" \
            -O /tmp/godot.zip
          unzip -q /tmp/godot.zip -d ~/godot

      - name: Download Godot export templates
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          TEMPLATES_DIR="$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          mkdir -p "$TEMPLATES_DIR"
          wget -q \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz" \
            -O /tmp/templates.tpz
          unzip -q /tmp/templates.tpz -d /tmp/templates
          mv /tmp/templates/templates/* "$TEMPLATES_DIR/"

      - name: Add Godot to PATH
        run: |
          mkdir -p "$HOME/.local/bin"
          ln -s "$HOME/godot/Godot_v${GODOT_VERSION}-stable_linux.x86_64" \
                "$HOME/.local/bin/godot"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      # ── Export ───────────────────────────────────────────────────────────────
      - name: Create output directory
        run: mkdir -p build/web

      # Run the editor once headless to let it import assets before exporting.
      - name: Import assets
        run: godot --headless --editor --quit || true

      - name: Export to Web
        run: godot --headless --export-release "Web" build/web/index.html

      # GitHub Pages doesn't run Jekyll; this prevents it from ignoring files
      # starting with underscores (Godot's export sometimes produces them).
      - name: Add .nojekyll
        run: touch build/web/.nojekyll

      # ── Deploy ───────────────────────────────────────────────────────────────
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
